services:
  - type: web
    name: academia-bordado-checkout
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: UMBRELLA_API_URL
        value: https://api-gateway.umbrellapag.com/api/user/transactions
      - key: UMBRELLA_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
